<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Page title shown in browser tab -->
    <title>Todo List</title>

    <!-- External CSS file -->
    <link rel="stylesheet" href="style.css" />

    <!-- Favicon icon for browser tab -->
    <link rel="icon" type="image/png" href="./assets/toDoListFavicon.png" />

    <!-- Font Awesome icons (for tick, cross, trash icons) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <!-- Main background section -->
    <div class="toDoSection">

      <div class="div">

        <!-- Main todo container box -->
        <div class="todo-box">

          <!-- App heading -->
          <h2>To-Do List</h2>

          <!-- Input area for adding new tasks -->
          <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter task" />
            <button class="addButton" onclick="addTask()">Add Task</button>
          </div>

          <!-- Task list will be displayed here dynamically -->
          <ul id="taskList"></ul>

          <!-- Bottom action buttons -->
          <div class="bottom-buttons">

            <!-- Save current list to local storage -->
            <button id="saveBtn" class="addButton" onclick="saveList()">
              Save List
            </button>

            <!-- Delete saved list from local storage -->
            <button class="deleteListBtn" onclick="deleteList()">
              Delete List
            </button>

          </div>

        </div>
      </div>
    </div>

    <!-- JavaScript file -->
    <script src="script.js"></script>
  </body>
</html>
